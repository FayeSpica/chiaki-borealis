apply plugin: 'com.android.application'

android {
    compileSdkVersion 33
    namespace "com.chiaki.borealis"

    defaultConfig {
        applicationId "com.chiaki.borealis"
        minSdkVersion 24
        targetSdkVersion 33
        versionCode 1
        versionName "2.2.0"
        ndk {
            abiFilters 'arm64-v8a'
        }
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }
    externalNativeBuild {
        cmake {
            version "3.22.1"
            path "jni/CMakeLists.txt"
        }
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.leanback:leanback:1.0.0'
}
